spring.application.name=berijalanassesment
spring.config.import=optional:file:.env[.properties]

# Server
server.port=${SERVER_PORT:8080}
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

# Database (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vigigate}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:public}

# SQL init (off by default)
spring.sql.init.mode=never

# Actuator (optional baseline if actuator is added later)
management.endpoints.web.exposure.include=health,info
app.api-base-url=${APP_API_BASE_URL:http://localhost:8080}

# Risk engine (deterministic rules)
risk.engine.timezone=${RISK_TIMEZONE:Asia/Jakarta}
risk.engine.model-version=${RISK_MODEL_VERSION:rules-v1}
risk.engine.low-max=${RISK_LOW_MAX:34}
risk.engine.medium-max=${RISK_MEDIUM_MAX:69}
risk.engine.business-hour-start=${RISK_BUSINESS_HOUR_START:7}
risk.engine.business-hour-end=${RISK_BUSINESS_HOUR_END:20}

# OpenAI portrait quality scoring
openai.api-key=${OPENAI_API_KEY:}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.model=${OPENAI_MODEL:gpt-4.1-mini}
openai.timeout-ms=${OPENAI_TIMEOUT_MS:20000}
openai.image-detail=${OPENAI_IMAGE_DETAIL:low}
openai.summary-model=${OPENAI_SUMMARY_MODEL:${OPENAI_MODEL:gpt-4.1-mini}}
openai.summary-timeout-ms=${OPENAI_SUMMARY_TIMEOUT_MS:${OPENAI_TIMEOUT_MS:20000}}

# Security JWT
security.jwt.secret=${SECURITY_JWT_SECRET:replace-with-a-32-char-min-dev-secret-key}
security.jwt.issuer=${SECURITY_JWT_ISSUER:vigigate-api}
security.jwt.access-ttl-seconds=${SECURITY_JWT_ACCESS_TTL_SECONDS:3600}
security.jwt.refresh-ttl-seconds=${SECURITY_JWT_REFRESH_TTL_SECONDS:604800}
security.jwt.refresh-rememberme-ttl-seconds=${SECURITY_JWT_REFRESH_REMEMBERME_TTL_SECONDS:2592000}

# Development seed data
app.seed.enabled=${APP_SEED_ENABLED:true}
app.seed.wipe=${APP_SEED_WIPE:true}
app.seed.bulk-visitors=${APP_SEED_BULK_VISITORS:200}
app.seed.bulk-open-alerts=${APP_SEED_BULK_OPEN_ALERTS:30}
app.seed.bulk-reports=${APP_SEED_BULK_REPORTS:14}
